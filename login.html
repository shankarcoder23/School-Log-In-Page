<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>School Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/login.css">

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-4">

            <div class="logo-box">
                <img src="assets/images/nava_school_logo.svg" class="logo">
            </div>

            <h2>Welcome Back</h2>

            <p>Login to your school portal</p>

        </div>

        <!-- Role Switch -->

        <div class="role-switch">

            <div class="switch-bg"></div>

            <button class="role-btn active" id="studentTab">

                <i class="bi bi-mortarboard-fill"></i>

                Student

            </button>

            <button class="role-btn" id="teacherTab">

                <i class="bi bi-person-workspace"></i>

                Teacher

            </button>

        </div>

        <form id="loginForm">

            <div class="input-group-custom">

                <i class="bi bi-telephone-fill"></i>

                <input type="tel"
                       id="phone"
                       class="form-control"
                       placeholder="Enter Mobile Number"
                       required>

            </div>

            <div class="input-group-custom password-group">

                <i class="bi bi-lock-fill"></i>

                <input type="password"
                       id="password"
                       class="form-control"
                       placeholder="Password"
                       required>

                <span class="toggle-password">

                    <i class="bi bi-eye-fill"></i>

                </span>

            </div>

            <div class="text-end mb-4">

                <a href="#" class="forgot-link">

                    Forgot Password?

                </a>

            </div>

            <button class="login-btn">

                <i class="bi bi-box-arrow-in-right"></i>

                Login Now

            </button>

        </form>

    </div>

</div>

<script src="assets/js/login.js"></script>

</body>
</html>
